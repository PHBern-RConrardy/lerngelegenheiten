<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wertetabellen-Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            margin-bottom: 20px;
            width: 500px;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 8px;
            text-align: center;
        }
        input {
            margin: 5px;
            width: 60px;
        }
    </style>
</head>
<body>

<h1>Wertetabellen-Generator</h1>

<button onclick="generateTable()">Tabelle regenerieren</button>
<button onclick="checkSolutions()">L÷sungen pr³fen</button>

<div id="tableContainer"></div>

<script>
let currentEquation = null;

function generateTable() {
    const tableContainer = document.getElementById('tableContainer');
    tableContainer.innerHTML = ''; // Vorherige Tabelle l÷schen
    currentEquation = null; // Zur³cksetzen der aktuellen Gleichung

    // Generiere 6 einzigartige x-Werte zwischen 1 und 10
    const xValues = [];
    while (xValues.length < 6) {
        const randomValue = Math.floor(Math.random() * 10) + 1;
        if (!xValues.includes(randomValue)) {
            xValues.push(randomValue);
        }
    }

    // Sortiere x-Werte in aufsteigender Reihenfolge
    xValues.sort((a, b) => a - b);

    while (true) {
        const m = Math.floor(Math.random() * 10) + 1; // m zwischen 1 und 10
        const b = Math.floor(Math.random() * 21) - 10; // b zwischen -10 und 10
        
        let yValues = [];
        let validTable = true;
        
        // Pr³fen, ob alle y-Werte im nat³rlichen Bereich liegen
        for (let x of xValues) {
            const y = m * x + b;
            if (y <= 0) {
                validTable = false;
                break;
            }
            yValues.push(y);
        }
        
        if (validTable) {
            const equation = b >= 0 ? `y = ${m}x + ${b}` : `y = ${m}x - ${-b}`;
            let yInputs = xValues.map((_, i) => `<input type="number" id="yValue${i}" placeholder="y${i+1}" />`).join(' ');
            const tableHTML = `
                <table>
                    <tr>
                        <th colspan="4">Wertetabelle</th>
                    </tr>
                    <tr>
                        <td>Gleichung</td>
                        <td colspan="3">${equation}</td>
                    </tr>
                    <tr>
                        <td>x-Werte</td>
                        <td colspan="3">${xValues.join(', ')}</td>
                    </tr>
                    <tr>
                        <td>Eigene y-Werte</td>
                        <td colspan="3">${yInputs}</td>
                    </tr>
                </table>
            `;
            tableContainer.innerHTML = tableHTML;
            currentEquation = { m, b, xValues, yValues };
            break;
        }
    }
}

// Generiere die Tabelle direkt beim Laden der Seite
generateTable();

function checkSolutions() {
    if (currentEquation) {
        const yValues = currentEquation.xValues.map((_, i) => parseFloat(document.getElementById(`yValue${i}`).value));
        const correctYValues = currentEquation.xValues.map(x => currentEquation.m * x + currentEquation.b);
        
        let resultsHTML = '<h2>Ergebnisse:</h2><ul>';
        
        yValues.forEach((y, i) => {
            const correctY = correctYValues[i];
            resultsHTML += `<li>x = ${currentEquation.xValues[i]}: Eingabe = ${y}, Erwartet = ${correctY}, ${y === correctY ? 'Richtig' : 'Falsch'}</li>`;
        });
        
        resultsHTML += '</ul>';
        
        document.getElementById('tableContainer').innerHTML += resultsHTML;
    } else {
        alert('Bitte generieren Sie zuerst eine Tabelle.');
    }
}
</script>

</body>
</html>
