<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x herausfinden</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>x herausfinden</h1>
    <div class="container">
        <p id="gleichung"></p>
        <label for="x-wert">Gib den Wert x ein:</label>
        <input type="number" id="x-wert" min="1" step="1" />
        <button onclick="ueberpruefen()">ueberpruefen</button>
        <button onclick="neueGleichung()">Neue Aufgabe</button>
        <p id="ergebnis"></p>
    </div>
    <script>
        let m, b, a;

        function generiereZufallswerte() {
            m = Math.floor(Math.random() * 10) + 1; // m in [1, 10]
            b = Math.floor(Math.random() * 21) - 10; // b in [-10, 10]
            a = Math.floor(Math.random() * 100); // a < 100

            // Formatieren der Gleichung, um negative Zahlen korrekt anzuzeigen
            let operator = b < 0 ? ' - ' : ' + ';
            let bFormatted = Math.abs(b);

            document.getElementById('gleichung').innerText = `${a} = ${m}x${operator}${bFormatted}`;
        }

        function ueberpruefen() {
            const xWert = parseInt(document.getElementById('x-wert').value, 10);
            if (isNaN(xWert) || xWert < 1) {
                document.getElementById('ergebnis').innerText = 'Bitte gib eine gueltige Zahl ein.';
                neueGleichung();
                return;
            }
            const berechnetesA = m * xWert + b;
            if (berechnetesA === a) {
                document.getElementById('ergebnis').innerText = 'Richtig!';
            } else {
                document.getElementById('ergebnis').innerText = `Falsch. Die richtige Antwort ist x = ${(a - b) / m}.`;
            }
        }

        function neueGleichung() {
            generiereZufallswerte();
            document.getElementById('ergebnis').innerText = '';
            document.getElementById('x-wert').value = '';
        }

        // Initiale Gleichung generieren
        generiereZufallswerte();
    </script>
</body>
</html>
