    name: University of Teacher Education Bern
    address: Länggassstrasse 35
    city: Bern
    postal-code: 3012
    url: https://www.phbern.ch
    department: Institut Sekundarstufe I
    ror: https://ror.org/05jf1ma54

citation: 
