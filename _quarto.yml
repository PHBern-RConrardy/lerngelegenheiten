    center: 
      - text: "Impressum"
        href: footer/impressum.qmd
      - text: "Disclaimer"
        href: footer/disclaimer.qmd 
      - text: "Kontakt"
        href: https://www.phbern.ch/ueber-die-phbern/personen/richard-conrardy  
    left: 
      - text: "PHBern"
